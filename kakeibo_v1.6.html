<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家計簿</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #141416;
    --surface2: #1c1c20;
    --surface3: #242428;
    --border: #2a2a30;
    --border2: #363640;
    --accent: #c8f06e;
    --accent2: #7ee8fa;
    --accent3: #f06e8e;
    --text: #f0f0f4;
    --text2: #9090a0;
    --text3: #5a5a6a;
    --red: #f06e8e;
    --green: #6ef0a8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 20px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .header-left h1 span { color: #b36ef0; }
  .header-left p {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Month nav */
  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .month-nav button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .month-nav button:hover { border-color: #b36ef0; color: #b36ef0; }
  .month-display {
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--text);
    min-width: 90px;
    text-align: center;
  }

  /* Summary cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: var(--border2); }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .card.income::before { background: var(--accent); }
  .card.expense::before { background: var(--accent3); }
  .card.balance::before { background: var(--accent2); }
  .card-label {
    font-size: 0.68rem;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
    margin-bottom: 8px;
  }
  .card-value {
    font-family: 'DM Mono', monospace;
    font-size: 1.6rem;
    font-weight: 500;
    letter-spacing: -0.02em;
  }
  .card.income .card-value { color: var(--accent); }
  .card.expense .card-value { color: var(--accent3); }
  .card.balance .card-value { color: var(--accent2); }
  .card-sub {
    font-size: 0.65rem;
    color: var(--text3);
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }

  /* Income section */
  .income-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .section-title {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    margin-bottom: 14px;
  }
  .income-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .income-item label {
    display: block;
    font-size: 0.68rem;
    color: var(--text3);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }
  .income-item input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .income-item input:focus { border-color: #b36ef0; }
  .income-item.readonly input {
    color: var(--text2);
    cursor: default;
    background: var(--bg);
  }

  /* Category bar */
  .cat-bar {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .cat-bar-item {
    flex: 1;
    padding: 10px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    border-right: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }
  .cat-bar-item:last-child { border-right: none; }
  .cat-bar-item:hover { background: var(--surface2); }
  .cat-bar-item.active { background: var(--surface3); }
  .cat-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .cat-bar-item span {
    font-size: 0.62rem;
    color: var(--text2);
    letter-spacing: 0.04em;
  }
  .cat-bar-item .cat-total {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--text3);
  }

  /* Add expense form */
  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    display: grid;
    grid-template-columns: 100px 1fr 130px 130px auto;
    gap: 10px;
    align-items: end;
  }
  .form-field label {
    display: block;
    font-size: 0.65rem;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-family: 'DM Mono', monospace;
  }
  .form-field input, .form-field select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    padding: 9px 10px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .form-field input:focus, .form-field select:focus { border-color: #b36ef0; }
  .form-field select option { background: var(--surface2); }

  .btn-add {
    background: var(--accent3);
    color: #0d0d0f;
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.15s, transform 0.1s;
    height: 38px;
  }
  .btn-add:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  /* Transaction list */
  .txn-list {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .txn-header {
    display: grid;
    grid-template-columns: 70px 1fr 100px 120px 40px;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 0.62rem;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }
  .txn-item {
    display: grid;
    grid-template-columns: 70px 1fr 100px 120px 40px;
    gap: 12px;
    padding: 13px 20px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    transition: background 0.12s;
    animation: fadeIn 0.2s ease;
  }
  .txn-item:last-child { border-bottom: none; }
  .txn-item:hover { background: var(--surface2); }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .txn-date {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text2);
  }
  .txn-memo {
    font-size: 0.85rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .txn-cat {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    color: var(--text2);
  }
  .txn-cat-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .txn-amount {
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    color: var(--accent3);
    text-align: right;
  }
  .txn-del {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 4px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
    text-align: center;
  }
  .txn-del:hover { color: var(--red); background: rgba(240,110,142,0.1); }

  .empty-state {
    padding: 48px 20px;
    text-align: center;
    color: var(--text3);
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    font-family: 'DM Mono', monospace;
  }

  /* Pie / Category breakdown */
  .breakdown {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .breakdown-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-top: 14px;
  }
  .breakdown-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .breakdown-bar-bg {
    height: 4px;
    background: var(--surface3);
    border-radius: 2px;
    overflow: hidden;
  }
  .breakdown-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  .breakdown-label {
    font-size: 0.65rem;
    color: var(--text3);
    letter-spacing: 0.04em;
  }
  .breakdown-val {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text2);
  }
  .breakdown-pct {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text3);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  @media (max-width: 640px) {
    body { padding: 16px 12px; }

    /* Header: 2段構成 */
    .header {
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 16px;
    }
    .header-left h1 { font-size: 1.8rem; }
    .contact-link { display: none; }

    /* ヘッダー右側: 横並び・折り返し */
    .header > div:last-child {
      width: 100%;
      flex-wrap: wrap;
      gap: 8px;
    }
    .btn-io { font-size: 0.65rem; padding: 6px 10px; }
    .month-nav { margin-left: auto; }
    .month-display { font-size: 0.95rem; min-width: 70px; }

    /* サマリー: 収入・支出横並び＋残高全幅 */
    .summary-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .summary-grid .card:last-child { grid-column: 1 / -1; }
    .card { padding: 14px 16px; }
    .card-value { font-size: 1.5rem; }

    /* 収入: 縦並び */
    .income-row { grid-template-columns: 1fr; gap: 10px; }

    /* カテゴリ: 2列 */
    .breakdown-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }

    /* 追加フォーム: 日付・カテゴリ各1列、メモ・金額・ボタン全幅 */
    .add-form { grid-template-columns: 1fr 1fr; gap: 8px; }
    .add-form > .form-field:nth-child(1) { grid-column: 1; }
    .add-form > .form-field:nth-child(2) { grid-column: 1 / -1; }
    .add-form > .form-field:nth-child(3) { grid-column: 1; }
    .add-form > .form-field:nth-child(4) { grid-column: 2; }
    .add-form > button { grid-column: 1 / -1; }

    /* 支出一覧 */
    .txn-header { grid-template-columns: 44px 1fr 80px 28px; }
    .txn-item   { grid-template-columns: 44px 1fr 80px 28px; }
    .txn-cat { display: none; }
    .txn-amount { font-size: 0.85rem; }

    /* セクション余白 */
    .section { padding: 16px; margin-bottom: 12px; }
    .section-title { font-size: 0.7rem; margin-bottom: 12px; }
  }

  .btn-io {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    padding: 7px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .btn-io:hover { border-color: #b36ef0; color: #b36ef0; }

  .contact-link {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 3px;
    text-decoration: none;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .contact-link:hover { opacity: 1; }
  .contact-link span {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--text2);
    letter-spacing: 0.06em;
  }
  .contact-link .contact-handle {
    color: #b36ef0;
    font-size: 0.72rem;
  }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-left">
      <h1>家計<span>簿</span></h1>
      <p>Household Budget Tracker</p>
    </div>
    <a href="https://x.com/Tech_LeMond" target="_blank" class="contact-link">
      <span>お問い合わせはXのDMへ</span>
      <span class="contact-handle">@Tech_LeMond</span>
    </a>
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="btn-io" onclick="exportData()">↓ 書き出し</button>
      <label class="btn-io" style="cursor:pointer;">↑ 読み込み<input type="file" accept=".json" onchange="importData(event)" style="display:none;"></label>
      <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <div class="month-display" id="monthDisplay"></div>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>
  </header>

  <!-- Summary -->
  <div class="summary-grid">
    <div class="card income">
      <div class="card-label">収入合計</div>
      <div class="card-value" id="totalIncome">¥0</div>
      <div class="card-sub">くりこし含む</div>
    </div>
    <div class="card expense">
      <div class="card-label">支出合計</div>
      <div class="card-value" id="totalExpense">¥0</div>
      <div class="card-sub" id="txnCount">0件</div>
    </div>
    <div class="card balance">
      <div class="card-label">今月の残高</div>
      <div class="card-value" id="balance">¥0</div>
      <div class="card-sub">収入 − 支出</div>
    </div>
  </div>

  <!-- Income -->
  <div class="income-section">
    <div class="section-title">収入</div>
    <div class="income-row">
      <div class="income-item readonly">
        <label>くりこし</label>
        <input type="text" id="carryover" readonly>
      </div>
      <div class="income-item">
        <label>給与</label>
        <input type="number" id="salary" placeholder="0" oninput="saveIncome()">
      </div>
      <div class="income-item">
        <label>その他</label>
        <input type="number" id="otherIncome" placeholder="0" oninput="saveIncome()">
      </div>
    </div>
  </div>

  <!-- Category breakdown -->
  <div class="breakdown">
    <div class="section-title">カテゴリ別支出</div>
    <div class="breakdown-grid" id="breakdownGrid"></div>
  </div>

  <!-- Add form -->
  <div class="add-form">
    <div class="form-field">
      <label>日付</label>
      <input type="number" id="inputDay" min="1" max="31" placeholder="日">
    </div>
    <div class="form-field">
      <label>メモ</label>
      <input type="text" id="inputMemo" placeholder="内容を入力">
    </div>
    <div class="form-field">
      <label>カテゴリ</label>
      <select id="inputCat">
        <option value="食費">食費</option>
        <option value="生活・雑貨">生活・雑貨</option>
        <option value="趣味・娯楽">趣味・娯楽</option>
        <option value="交通費">交通費</option>
        <option value="その他">その他</option>
      </select>
    </div>
    <div class="form-field">
      <label>金額</label>
      <input type="number" id="inputAmount" placeholder="0" min="0">
    </div>
    <button class="btn-add" onclick="addEntry()">＋ 追加</button>
  </div>

  <!-- Transaction list -->
  <div class="txn-list">
    <div class="txn-header">
      <span>日付</span>
      <span>メモ</span>
      <span>カテゴリ</span>
      <span style="text-align:right">金額</span>
      <span></span>
    </div>
    <div id="txnList"></div>
  </div>
</div>

<script>
const CATS = [
  { name: '食費',      color: '#c8f06e' },
  { name: '生活・雑貨', color: '#7ee8fa' },
  { name: '趣味・娯楽', color: '#f0b96e' },
  { name: '交通費',    color: '#b36ef0' },
  { name: 'その他',    color: '#f06e8e' },
];

const STORAGE_KEY = 'kakeibo_v1';
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth(); // 0-indexed

function getKey(y, m) { return `${y}_${m}`; }

function loadData(y, m) {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const all = raw ? JSON.parse(raw) : {};
    return all[getKey(y, m)] || { entries: [], salary: '', otherIncome: '' };
  } catch { return { entries: [], salary: '', otherIncome: '' }; }
}

function saveData(y, m, data) {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const all = raw ? JSON.parse(raw) : {};
    all[getKey(y, m)] = data;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
  } catch(e) { console.error(e); }
}

function getCarryover(y, m, depth) {
  // 先月の残高を再帰的に取得（最大24ヶ月遡る）
  if ((depth || 0) > 24) return 0;
  let pm = m - 1, py = y;
  if (pm < 0) { pm = 11; py--; }
  // 全データを確認して前月キーが存在しなければ0（本当に未入力の月）
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const all = raw ? JSON.parse(raw) : {};
    if (!all[getKey(py, pm)]) return 0; // そのキー自体がなければ0
  } catch { return 0; }
  const prev = loadData(py, pm);
  const prevCarryover = getCarryover(py, pm, (depth || 0) + 1);
  const income = (Number(prev.salary) || 0) + (Number(prev.otherIncome) || 0) + prevCarryover;
  const expense = (prev.entries || []).reduce((s, e) => s + e.amount, 0);
  return income - expense;
}

function fmt(n) {
  return '¥' + Math.round(n).toLocaleString('ja-JP');
}

function render() {
  const data = loadData(currentYear, currentMonth);
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('monthDisplay').textContent = `${currentYear} / ${monthNames[currentMonth]}`;

  const carryover = getCarryover(currentYear, currentMonth);
  document.getElementById('carryover').value = Math.round(carryover).toLocaleString();
  document.getElementById('salary').value = data.salary || '';
  document.getElementById('otherIncome').value = data.otherIncome || '';

  const totalIncome = carryover + (Number(data.salary) || 0) + (Number(data.otherIncome) || 0);
  const totalExpense = (data.entries || []).reduce((s, e) => s + e.amount, 0);
  const bal = totalIncome - totalExpense;

  document.getElementById('totalIncome').textContent = fmt(totalIncome);
  document.getElementById('totalExpense').textContent = fmt(totalExpense);
  document.getElementById('txnCount').textContent = `${data.entries.length}件`;
  const balEl = document.getElementById('balance');
  balEl.textContent = fmt(bal);
  balEl.style.color = bal >= 0 ? 'var(--accent2)' : 'var(--accent3)';

  // Breakdown
  const catTotals = {};
  CATS.forEach(c => catTotals[c.name] = 0);
  (data.entries || []).forEach(e => { if (catTotals[e.cat] !== undefined) catTotals[e.cat] += e.amount; });
  document.getElementById('breakdownGrid').innerHTML = CATS.map(c => {
    const pct = totalExpense > 0 ? (catTotals[c.name] / totalExpense * 100) : 0;
    return `
    <div class="breakdown-item">
      <div class="breakdown-bar-bg">
        <div class="breakdown-bar-fill" style="width:${pct.toFixed(1)}%;background:${c.color}"></div>
      </div>
      <div class="breakdown-label">${c.name}</div>
      <div class="breakdown-val">${fmt(catTotals[c.name])}</div>
      <div class="breakdown-pct">${pct.toFixed(0)}%</div>
    </div>`;
  }).join('');

  // Transactions
  const sorted = [...(data.entries || [])].sort((a, b) => a.day - b.day);
  const listEl = document.getElementById('txnList');
  if (sorted.length === 0) {
    listEl.innerHTML = '<div class="empty-state">— まだ支出がありません —</div>';
    return;
  }
  listEl.innerHTML = sorted.map(e => {
    const cat = CATS.find(c => c.name === e.cat) || CATS[4];
    return `
    <div class="txn-item">
      <div class="txn-date">${e.day}日</div>
      <div class="txn-memo">${e.memo || '—'}</div>
      <div class="txn-cat"><span class="txn-cat-dot" style="background:${cat.color}"></span>${e.cat}</div>
      <div class="txn-amount">−${fmt(e.amount)}</div>
      <button class="txn-del" onclick="deleteEntry('${e.id}')">✕</button>
    </div>`;
  }).join('');
}

function saveIncome() {
  const data = loadData(currentYear, currentMonth);
  data.salary = document.getElementById('salary').value;
  data.otherIncome = document.getElementById('otherIncome').value;
  saveData(currentYear, currentMonth, data);
  render();
}

function addEntry() {
  const day = parseInt(document.getElementById('inputDay').value);
  const memo = document.getElementById('inputMemo').value.trim();
  const cat = document.getElementById('inputCat').value;
  const amount = parseInt(document.getElementById('inputAmount').value);

  if (!day || day < 1 || day > 31 || !amount || amount <= 0) {
    document.getElementById('inputDay').style.borderColor = (!day || day < 1 || day > 31) ? 'var(--accent3)' : 'var(--border)';
    document.getElementById('inputAmount').style.borderColor = (!amount || amount <= 0) ? 'var(--accent3)' : 'var(--border)';
    return;
  }
  document.getElementById('inputDay').style.borderColor = 'var(--border)';
  document.getElementById('inputAmount').style.borderColor = 'var(--border)';

  const data = loadData(currentYear, currentMonth);
  data.entries.push({ id: Date.now().toString(), day, memo, cat, amount });
  saveData(currentYear, currentMonth, data);

  document.getElementById('inputDay').value = '';
  document.getElementById('inputMemo').value = '';
  document.getElementById('inputAmount').value = '';
  render();
}

function deleteEntry(id) {
  const data = loadData(currentYear, currentMonth);
  data.entries = data.entries.filter(e => e.id !== id);
  saveData(currentYear, currentMonth, data);
  render();
}

function changeMonth(dir) {
  // 現在の月のキーを確実に保存してから移動（くりこし計算のため）
  const cur = loadData(currentYear, currentMonth);
  saveData(currentYear, currentMonth, cur);
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  render();
}

// Enter key to add
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.closest('.add-form')) addEntry();
});

// 初回ロード時も現在月のキーを保存（くりこし計算のため）
(function() {
  const cur = loadData(currentYear, currentMonth);
  saveData(currentYear, currentMonth, cur);
})();

render();

function exportData() {
  const raw = localStorage.getItem(STORAGE_KEY) || '{}';
  const blob = new Blob([raw], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'kakeibo_backup.json';
  a.click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      JSON.parse(e.target.result); // validate
      localStorage.setItem(STORAGE_KEY, e.target.result);
      render();
      event.target.value = '';
    } catch { alert('ファイルの形式が正しくありません'); }
  };
  reader.readAsText(file);
}
</script>
